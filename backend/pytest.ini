[pytest]
testpaths = tests evaluation/deepeval_tests
pythonpath = .
markers =
    contract: Contract tests for public interfaces and integrations
    eval: DeepEval evaluation tests
    fast: Fast, deterministic tests with no external services
    integration: Tests that exercise real service integrations
    llm: Tests that require an LLM API key or LLM-as-a-judge
    regression: Regression tests for previously fixed behavior
    requires_postgres: Tests that require TEST_POSTGRES_DSN
    requires_redis: Tests that require TEST_REDIS_URL
    requires_dramatiq: Tests that require a Dramatiq worker and Redis broker
