[pytest]
testpaths = tests
markers =
    fast: 快速测试（不消耗 LLM tokens）
    llm: 需要 LLM API 的测试
    regression: 回归测试套件
    eval: 质量评测（消耗较多 tokens）
    requires_dramatiq: 需要真实 Dramatiq Broker/Worker 的测试
    requires_redis: 需要真实 Redis 的测试
    requires_postgres: 需要真实 PostgreSQL 的测试
    contract: 协议和兼容性契约测试
    integration: 真实基础设施集成测试，默认可用 -m integration 单独选择
asyncio_mode = auto
