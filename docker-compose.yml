# Compose 使用仓库根目录 .env 作为全量配置来源。
# 标准启动命令：docker compose --env-file .env up -d --build

x-service-env: &service_env
  env_file:
    - .env

x-backend-overrides: &backend_overrides
  # 容器内服务地址覆盖本机 .env 地址；其余全量变量继续来自 env_file。
  DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}
  REDIS_URL: redis://redis:6379/0
  AUTO_CREATE_TABLES: "false"
  MEM0_PGVECTOR_HOST: postgres
  MEM0_PGVECTOR_PORT: "5432"
  MEM0_PGVECTOR_DBNAME: ${POSTGRES_DB:?set POSTGRES_DB in .env}
  MEM0_PGVECTOR_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
  MEM0_PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}

services:
  # PostgreSQL 数据库
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_interview_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:?set POSTGRES_PORT in .env}:5432"
    networks:
      - agent_interview_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent_interview_redis
    restart: always
    ports:
      - "127.0.0.1:${REDIS_PORT:?set REDIS_PORT in .env}:6379"
    networks:
      - agent_interview_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 在 API 和 Worker 启动前执行可重复的 schema 初始化/增量迁移。
  migrate:
    <<: *service_env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_interview_migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend_overrides
    command: ["python", "-m", "app.entrypoints.deployment", "migrate"]
    networks:
      - agent_interview_network
    healthcheck:
      disable: true

  # 后端 API
  backend:
    <<: *service_env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_interview_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *backend_overrides
    networks:
      - agent_interview_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -m app.entrypoints.deployment readiness && curl -fsS http://localhost:8000/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    <<: *service_env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_interview_worker
    restart: on-failure
    command: ["/app/scripts/run-worker.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *backend_overrides
    networks:
      - agent_interview_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -m app.entrypoints.deployment readiness"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL in .env}
    container_name: agent_interview_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agent_interview_network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: agent_interview_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - agent_interview_network

volumes:
  postgres_data:

networks:
  agent_interview_network:
    driver: bridge
