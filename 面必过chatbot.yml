          \ YaHei','PingFang SC',Arial,sans-serif;\"\n    'font-size:14px;color:#1f2937;\"\
          >未接收到有效的复盘报告内容</div>'\n)\n\nOUTER_DIV_START = (\n    '<div style=\"width:186mm;margin:0\
          \ auto;padding:8mm 9mm;'\n    \"box-sizing:border-box;font-family:'Microsoft\
          \ YaHei','PingFang SC',Arial,sans-serif;\"\n    'font-size:13px;line-height:1.65;color:#1f2937;background:#f1f5f9;\"\
          >'\n)\n\ndef main(raw_output: str) -> dict:\n    if not raw_output or not\
          \ raw_output.strip():\n        return {\"markdown_content\": DEFAULT_CONTENT}\n\
          \n    text = raw_output.strip()\n\n    # 1. 如果输入是 JSON，优先提取 markdown_content\
          \ / text / output / answer\n    try:\n        data = json.loads(text)\n\
          \        if isinstance(data, dict):\n            text = (\n            \
          \    data.get(\"markdown_content\")\n                or data.get(\"text\"\
          )\n                or data.get(\"output\")\n                or data.get(\"\
          answer\")\n                or text\n            )\n    except Exception:\n\
          \        pass\n\n    if not text or not str(text).strip():\n        return\
          \ {\"markdown_content\": DEFAULT_CONTENT}\n\n    text = str(text).strip()\n\
          \n    # 2. 处理常见 JSON 字符串转义\n    # 注意：如果 text 已经被 json.loads 正常反序列化，这一步不会造成问题\n\
          \    text = text.replace(\"\\\\n\", \"\\n\").replace('\\\\\"', '\"').replace(\"\
          \\\\/\", \"/\")\n\n    # 3. 去掉 <think>...</think>\n    text = re.sub(\n\
          \        r\"<think>.*?</think>\",\n        \"\",\n        text,\n      \
          \  flags=re.DOTALL | re.IGNORECASE\n    ).strip()\n\n    # 4. 去掉 Markdown\
          \ 代码块包裹\n    text = re.sub(\n        r\"^```(?:markdown|md|html)?\\s*\"\
          ,\n        \"\",\n        text,\n        flags=re.IGNORECASE\n    ).strip()\n\
          \    text = re.sub(r\"\\s*```$\", \"\", text).strip()\n\n    # 5. 去掉模型可能输出的解释性前缀\n\
          \    bad_prefix_patterns = [\n        r\"^以下是.*?[:：]\\s*\",\n        r\"\
          ^下面是.*?[:：]\\s*\",\n        r\"^这是.*?[:：]\\s*\",\n        r\"^已为你.*?[:：]\\\
          s*\",\n        r\"^好的.*?[:：]\\s*\",\n    ]\n\n    for pattern in bad_prefix_patterns:\n\
          \        text = re.sub(pattern, \"\", text, flags=re.DOTALL).strip()\n\n\
          \    # 6. 删除完整 HTML 里的 style/head，避免 class 样式残留或污染 md_to_html\n    text\
          \ = re.sub(\n        r\"<style[^>]*>.*?</style>\",\n        \"\",\n    \
          \    text,\n        flags=re.DOTALL | re.IGNORECASE\n    ).strip()\n\n \
          \   text = re.sub(\n        r\"<head[^>]*>.*?</head>\",\n        \"\",\n\
          \        text,\n        flags=re.DOTALL | re.IGNORECASE\n    ).strip()\n\
          \n    # 7. 如果模型错误输出完整 HTML，只保留 body 内部\n    body_match = re.search(\n  \
          \      r\"<body[^>]*>(.*?)</body>\",\n        text,\n        flags=re.DOTALL\
          \ | re.IGNORECASE\n    )\n    if body_match:\n        text = body_match.group(1).strip()\n\
          \n    # 8. 去掉完整 HTML 外壳标签\n    text = re.sub(r\"<!DOCTYPE html\\s*>\", \"\
          \", text, flags=re.IGNORECASE).strip()\n    text = re.sub(r\"</?html[^>]*>\"\
          , \"\", text, flags=re.IGNORECASE).strip()\n    text = re.sub(r\"</?body[^>]*>\"\
          , \"\", text, flags=re.IGNORECASE).strip()\n\n    # 9. 强制删除所有 class 属性\n\
          \    text = re.sub(r'\\sclass\\s*=\\s*\"[^\"]*\"', \"\", text, flags=re.IGNORECASE)\n\
          \    text = re.sub(r\"\\sclass\\s*=\\s*'[^']*'\", \"\", text, flags=re.IGNORECASE)\n\
          \n    # 10. 删除 id 属性，避免 md_to_html 或前端样式冲突\n    text = re.sub(r'\\sid\\\
          s*=\\s*\"[^\"]*\"', \"\", text, flags=re.IGNORECASE)\n    text = re.sub(r\"\
          \\sid\\s*=\\s*'[^']*'\", \"\", text, flags=re.IGNORECASE)\n\n    # 11. 删除空\
          \ HTML 注释\n    text = re.sub(r\"<!--.*?-->\", \"\", text, flags=re.DOTALL).strip()\n\
          \n    # 12. 如果还残留完整 HTML 禁止标签，继续清理\n    forbidden_patterns = [\n       \
          \ r\"</?head[^>]*>\",\n        r\"</?style[^>]*>\",\n        r\"</?script[^>]*>\"\
          ,\n        r\"</?meta[^>]*>\",\n        r\"</?title[^>]*>\",\n        r\"\
          </?link[^>]*>\",\n    ]\n\n    for pattern in forbidden_patterns:\n    \
          \    text = re.sub(pattern, \"\", text, flags=re.IGNORECASE).strip()\n\n\
          \    # 13. 去掉首尾多余空白\n    text = text.strip()\n\n    if not text:\n     \
          \   return {\"markdown_content\": DEFAULT_CONTENT}\n\n    # 14. 如果没有最外层容器，兜底包一层\n\
          \    if not text.lstrip().startswith(\"<div\"):\n        text = OUTER_DIV_START\
          \ + \"\\n\" + text + \"\\n</div>\"\n\n    # 15. 如果存在 class=，兜底再删一次\n   \
          \ text = re.sub(r'\\sclass\\s*=\\s*\"[^\"]*\"', \"\", text, flags=re.IGNORECASE)\n\
          \    text = re.sub(r\"\\sclass\\s*=\\s*'[^']*'\", \"\", text, flags=re.IGNORECASE)\n\
          \n    # 16. 最终兜底：如果仍然出现 <style>，直接删除\n    text = re.sub(\n        r\"<style[^>]*>.*?</style>\"\
          ,\n        \"\",\n        text,\n        flags=re.DOTALL | re.IGNORECASE\n\
          \    ).strip()\n\n    return {\n        \"markdown_content\": text\n   \
          \ }"
