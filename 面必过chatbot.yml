    - data:
        code: "import re\nimport html\n\n\ndef main(raw_output: str) -> dict:\n  \
          \  fallback = (\n        '<div style=\"width:186mm;margin:0 auto;padding:8mm\
          \ 10mm;'\n        \"box-sizing:border-box;font-family:'Microsoft YaHei','PingFang\
          \ SC',\"\n        \"Arial,sans-serif;font-size:13px;color:#1f2937;\"\n \
          \       'background:#ffffff;\">未接收到有效的简历内容</div>'\n    )\n\n    if not raw_output\
          \ or not raw_output.strip():\n        return {\n            \"clean_markdown\"\
          : fallback\n        }\n\n    text = raw_output.strip()\n\n    # 1. 去掉 <think>...</think>\n\
          \    text = re.sub(r\"<think>.*?</think>\", \"\", text, flags=re.DOTALL).strip()\n\
          \n    # 2. 去掉 Markdown 代码块外壳，例如 ```markdown、```html、```\n    text = re.sub(r\"\
          ^```(?:markdown|md|html)?\\s*\", \"\", text, flags=re.IGNORECASE).strip()\n\
          \    text = re.sub(r\"\\s*```$\", \"\", text).strip()\n\n    # 3. 拆掉已经生成的\
          \ <pre><code>...</code></pre>，并反转义\n    def unwrap_code(match):\n      \
          \  inner = match.group(1)\n        return html.unescape(inner).strip()\n\
          \n    text = re.sub(\n        r\"<pre><code>(.*?)</code></pre>\",\n    \
          \    unwrap_code,\n        text,\n        flags=re.DOTALL | re.IGNORECASE,\n\
          \    )\n\n    # 4. 反转义 HTML 实体，避免 &lt;div&gt; 作为文本输出\n    text = html.unescape(text).strip()\n\
          \n    # 5. 从有效简历内容开始截取，优先从 A4 容器开始\n    candidates = []\n\n    div_match\
          \ = re.search(\n        r'(?i)<div\\s+style=\"[^\"]*width\\s*:\\s*(?:18[0-9]mm|190mm|186mm)',\n\
          \        text,\n    )\n    if div_match:\n        candidates.append(div_match.start())\n\
          \n    h1_match = re.search(r\"(?i)<h1\\b\", text)\n    if h1_match:\n  \
          \      candidates.append(h1_match.start())\n\n    styled_div_match = re.search(r'(?i)<div\\\
          s+style=\"', text)\n    if styled_div_match:\n        candidates.append(styled_div_match.start())\n\
          \n    md_h1_match = re.search(r\"(?m)^#\\s+\", text)\n    if md_h1_match:\n\
          \        candidates.append(md_h1_match.start())\n\n    if candidates:\n\
          \        text = text[min(candidates):].strip()\n\n    # 6. 去掉 HTML 标签行前缩进，防止\
          \ md_to_html 识别成代码块\n    cleaned_lines = []\n    for line in text.splitlines():\n\
          \        stripped = line.lstrip()\n\n        if stripped.startswith(\"<\"\
          ) or stripped.startswith(\"</\"):\n            cleaned_lines.append(stripped)\n\
          \        else:\n            cleaned_lines.append(line.rstrip())\n\n    text\
          \ = \"\\n\".join(cleaned_lines).strip()\n\n    # 7. 修复常见的联系方式被误包成代码块的情况\n\
          \    text = re.sub(\n        r\"<pre><code>(.*?)</code></pre>\",\n     \
          \   lambda m: html.unescape(m.group(1)).strip(),\n        text,\n      \
          \  flags=re.DOTALL | re.IGNORECASE,\n    )\n\n    # 8. 清理连续空行\n    text\
          \ = re.sub(r\"\\n{3,}\", \"\\n\\n\", text).strip()\n\n    # 9. 如果没有外层 A4\
          \ 容器，自动包一层\n    has_a4_container = re.search(\n        r'(?i)<div\\s+style=\"\
          [^\"]*width\\s*:\\s*(?:18[0-9]mm|190mm|186mm)',\n        text,\n    )\n\n\
          \    if not has_a4_container and text:\n        text = (\n            '<div\
          \ style=\"width:186mm;margin:0 auto;padding:8mm 10mm;'\n            \"box-sizing:border-box;font-family:'Microsoft\
          \ YaHei','PingFang SC',\"\n            \"Arial,sans-serif;font-size:13px;line-height:1.5;color:#1f2937;\"\
          \n            'background:#ffffff;\">\\n'\n            + text\n        \
          \    + \"\\n</div>\"\n        )\n\n    if not text:\n        text = fallback\n\
          \n    return {\n        \"clean_markdown\": text\n    }"
